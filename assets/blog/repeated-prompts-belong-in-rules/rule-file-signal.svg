<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Repeated prompt moves into a rule file</title>
  <desc id="desc">Three repeated prompt cards point to a repository rule file and verification gate.</desc>
  <rect width="1200" height="640" rx="0" fill="#FCF9F8"/>
  <path d="M0 520C170 482 277 575 438 536C596 498 641 404 812 421C963 435 1039 517 1200 480V640H0V520Z" fill="#DFF4F1"/>
  <path d="M0 88H1200" stroke="#D9E2DF" stroke-width="2"/>
  <path d="M0 552H1200" stroke="#D9E2DF" stroke-width="2"/>

  <text x="84" y="90" fill="#1C1B1B" font-family="Hanken Grotesk, Noto Sans KR, Arial, sans-serif" font-size="52" font-weight="700">Third repeat becomes a rule</text>
  <text x="84" y="138" fill="#3D4947" font-family="Noto Sans KR, Arial, sans-serif" font-size="28">Move the repeated condition into repo context.</text>

  <g transform="translate(84 198)">
    <rect width="256" height="118" fill="#FFFFFF" stroke="#BCC9C6" stroke-width="2"/>
    <text x="24" y="42" fill="#00685F" font-family="JetBrains Mono, monospace" font-size="24" font-weight="500">prompt #1</text>
    <text x="24" y="78" fill="#1C1B1B" font-family="Noto Sans KR, Arial, sans-serif" font-size="24">draft first</text>
    <text x="24" y="106" fill="#3D4947" font-family="Noto Sans KR, Arial, sans-serif" font-size="20">do not deploy</text>
  </g>

  <g transform="translate(84 340)">
    <rect width="256" height="118" fill="#FFFFFF" stroke="#BCC9C6" stroke-width="2"/>
    <text x="24" y="42" fill="#00685F" font-family="JetBrains Mono, monospace" font-size="24" font-weight="500">prompt #2</text>
    <text x="24" y="78" fill="#1C1B1B" font-family="Noto Sans KR, Arial, sans-serif" font-size="24">draft first</text>
    <text x="24" y="106" fill="#3D4947" font-family="Noto Sans KR, Arial, sans-serif" font-size="20">do not deploy</text>
  </g>

  <g transform="translate(84 482)">
    <rect width="256" height="118" fill="#FFFFFF" stroke="#BCC9C6" stroke-width="2"/>
    <text x="24" y="42" fill="#00685F" font-family="JetBrains Mono, monospace" font-size="24" font-weight="500">prompt #3</text>
    <text x="24" y="78" fill="#1C1B1B" font-family="Noto Sans KR, Arial, sans-serif" font-size="23">same sentence</text>
    <text x="24" y="106" fill="#904D00" font-family="Noto Sans KR, Arial, sans-serif" font-size="20">move it out</text>
  </g>

  <path d="M370 398H500" stroke="#00685F" stroke-width="4"/>
  <path d="M500 398L482 386V410L500 398Z" fill="#00685F"/>

  <g transform="translate(530 210)">
    <rect width="300" height="260" fill="#FFFFFF" stroke="#00685F" stroke-width="3"/>
    <rect x="24" y="28" width="252" height="44" fill="#D4E6E5" stroke="#00685F" stroke-width="1"/>
    <text x="44" y="60" fill="#005049" font-family="JetBrains Mono, monospace" font-size="26" font-weight="500">AGENTS.md</text>
    <text x="34" y="116" fill="#1C1B1B" font-family="Noto Sans KR, Arial, sans-serif" font-size="28">repo defaults</text>
    <text x="34" y="154" fill="#3D4947" font-family="Noto Sans KR, Arial, sans-serif" font-size="21">- draft first</text>
    <text x="34" y="184" fill="#3D4947" font-family="Noto Sans KR, Arial, sans-serif" font-size="21">- no dist edits</text>
    <text x="34" y="214" fill="#3D4947" font-family="Noto Sans KR, Arial, sans-serif" font-size="21">- ask before push</text>
    <text x="34" y="244" fill="#3D4947" font-family="Noto Sans KR, Arial, sans-serif" font-size="21">- verify before done</text>
  </g>

  <path d="M852 340H962" stroke="#904D00" stroke-width="4"/>
  <path d="M962 340L944 328V352L962 340Z" fill="#904D00"/>

  <g transform="translate(984 256)">
    <rect width="150" height="168" fill="#FFF3E8" stroke="#904D00" stroke-width="2"/>
    <text x="22" y="48" fill="#663500" font-family="JetBrains Mono, monospace" font-size="22" font-weight="500">gate</text>
    <circle cx="75" cy="84" r="28" fill="#FFFFFF" stroke="#904D00" stroke-width="3"/>
    <path d="M61 84L72 95L91 72" stroke="#00685F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="26" y="132" fill="#1C1B1B" font-family="Noto Sans KR, Arial, sans-serif" font-size="16">same rule</text>
    <text x="26" y="156" fill="#3D4947" font-family="Noto Sans KR, Arial, sans-serif" font-size="15">every run</text>
  </g>
</svg>
